- name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Combining these ensures all requirements are met at once
          pip install -r requirements.txt pytest pytest-cov flask-sqlalchemy

      - name: Run tests
        # Added --tb=short to give you a cleaner error summary if it fails again
        run: |
          python -m pytest test/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///:memory:
          PYTHONPATH: .